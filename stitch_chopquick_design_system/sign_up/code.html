<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        .glow-primary {
            box-shadow: 0 0 20px rgba(207, 188, 255, 0.35);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<header class="px-margin_mobile md:px-margin_desktop py-md w-full max-w-md mx-auto">
<button class="text-on-surface hover:text-primary transition-colors flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">arrow_back</span>
</button>
</header>
<main class="flex-grow flex flex-col px-margin_mobile md:px-margin_desktop w-full max-w-md mx-auto pb-xxl">
<div class="mb-xl">
<h1 class="font-display-mobile text-display-mobile md:font-display md:text-display text-on-surface mb-sm tracking-tight">Create your account</h1>
<p class="font-body text-body text-on-surface-variant">Start saving on meals tonight</p>
</div>
<form class="flex flex-col gap-md">
<div class="relative group">
<div class="bg-surface rounded-lg border border-outline-variant group-focus-within:border-primary transition-colors overflow-hidden flex items-center px-md h-[56px]">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-body placeholder-on-surface-variant p-0" id="fullname" placeholder="Full name" type="text"/>
</div>
</div>
<div class="relative group">
<div class="bg-surface rounded-lg border border-outline-variant group-focus-within:border-primary transition-colors overflow-hidden flex items-center h-[56px]">
<div class="flex items-center gap-sm px-md border-r border-outline-variant h-full text-on-surface">
<span class="text-lg leading-none">🇳🇬</span>
<span class="font-body text-body">+234</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-body placeholder-on-surface-variant p-0 px-md" id="phone" placeholder="Phone number" type="tel"/>
</div>
</div>
<div class="relative group">
<div class="bg-surface rounded-lg border border-outline-variant group-focus-within:border-primary transition-colors overflow-hidden flex items-center px-md h-[56px]">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-body placeholder-on-surface-variant p-0" id="email" placeholder="Email address" type="email"/>
</div>
</div>
<div class="relative group">
<div class="bg-surface rounded-lg border border-outline-variant group-focus-within:border-primary transition-colors overflow-hidden flex items-center px-md h-[56px]">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-body placeholder-on-surface-variant p-0" id="password" placeholder="Password" type="password"/>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-sm ml-sm" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">visibility_off</span>
</button>
</div>
</div>
<div class="relative mt-sm">
<details class="group w-full">
<summary class="font-body text-body text-primary cursor-pointer list-none flex items-center gap-xs hover:text-primary-fixed transition-colors">
                        Have a referral code?
                        <span class="material-symbols-outlined text-[18px] transition-transform group-open:rotate-180">expand_more</span>
</summary>
<div class="mt-md bg-surface rounded-lg border border-outline-variant focus-within:border-primary transition-colors overflow-hidden flex items-center px-md h-[56px]">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-body placeholder-on-surface-variant p-0" id="referral" placeholder="Enter code (optional)" type="text"/>
</div>
</details>
</div>
<button class="w-full mt-lg h-[56px] rounded-full bg-primary text-on-primary font-h2 text-h2 flex items-center justify-center hover:bg-primary-fixed transition-colors active:scale-[0.98] glow-primary" type="button">
                Create Account
            </button>
</form>
<div class="flex items-center gap-md my-xl">
<div class="flex-grow h-px bg-outline-variant opacity-50"></div>
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider">or</span>
<div class="flex-grow h-px bg-outline-variant opacity-50"></div>
</div>
<button class="w-full h-[56px] rounded-full border border-outline-variant bg-transparent text-on-surface font-h2 text-h2 flex items-center justify-center gap-sm hover:bg-surface-container-high transition-colors active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continue with Google
        </button>
<div class="mt-auto pt-xl text-center">
<p class="font-body text-body text-on-surface-variant">
                Already have an account? 
                <a class="text-primary hover:text-primary-fixed font-medium transition-colors" href="#">Log in</a>
</p>
</div>
</main>
</body></html>
