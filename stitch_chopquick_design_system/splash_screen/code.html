<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChopQuick - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#594400",
                        "on-primary": "#381e72",
                        "tertiary-fixed": "#ffdf93",
                        "outline-variant": "#494551",
                        "tertiary-container": "#c9a74d",
                        "on-background": "#e6e0e9",
                        "primary-fixed-dim": "#cfbcff",
                        "on-secondary-fixed": "#1f1635",
                        "inverse-surface": "#e6e0e9",
                        "on-secondary-container": "#bfb2da",
                        "primary-fixed": "#e9ddff",
                        "surface-dim": "#141218",
                        "surface": "#141218",
                        "on-secondary": "#342b4b",
                        "error": "#ffb4ab",
                        "primary-container": "#6750a4",
                        "surface-variant": "#36343a",
                        "error-container": "#93000a",
                        "on-tertiary": "#3e2e00",
                        "on-tertiary-container": "#503d00",
                        "surface-container-highest": "#36343a",
                        "on-primary-fixed-variant": "#4f378a",
                        "primary": "#cfbcff",
                        "background": "#141218",
                        "surface-container-high": "#2b292f",
                        "tertiary-fixed-dim": "#e7c365",
                        "on-surface-variant": "#cbc4d2",
                        "on-primary-fixed": "#22005d",
                        "surface-container-low": "#1d1b20",
                        "surface-container-lowest": "#0f0d13",
                        "surface-container": "#211f24",
                        "on-surface": "#e6e0e9",
                        "surface-tint": "#cfbcff",
                        "secondary-fixed": "#e9ddff",
                        "on-error": "#690005",
                        "on-tertiary-fixed": "#241a00",
                        "on-primary-container": "#e0d2ff",
                        "secondary-fixed-dim": "#cdc0e9",
                        "surface-bright": "#3b383e",
                        "tertiary": "#e7c365",
                        "outline": "#948e9c",
                        "secondary": "#cdc0e9",
                        "secondary-container": "#4d4465",
                        "inverse-on-surface": "#322f35",
                        "on-secondary-fixed-variant": "#4b4263",
                        "inverse-primary": "#6750a4",
                        "on-error-container": "#ffdad6",
                        "chopquick-orange": "#E8480F" 
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "1.5rem",
                        "margin_mobile": "1rem",
                        "sm": "0.5rem",
                        "margin_desktop": "2.5rem",
                        "xxl": "3rem",
                        "xl": "2rem",
                        "gutter": "1rem",
                        "xs": "0.25rem",
                        "md": "1rem"
                    },
                    "fontFamily": {
                        "caption": ["Inter"],
                        "label-caps": ["Inter"],
                        "display": ["Inter"],
                        "h1": ["Inter"],
                        "h2": ["Inter"],
                        "body": ["Inter"],
                        "display-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "caption": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "h2": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-mobile": ["40px", { "lineHeight": "1.1", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .splash-glow {
            background: radial-gradient(circle, rgba(232, 72, 15, 0.1) 0%, rgba(20, 18, 24, 0) 70%);
        }
        
        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #1d1b20; /* surface-container-low */
        }

        .progress-bar {
            height: 100%;
            background-color: #E8480F; /* chopquick-orange */
            width: 60%; /* Static representation of progress */
            border-radius: 0 999px 999px 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col relative overflow-hidden font-body text-on-background">
<!-- Splash Content -->
<main class="flex-grow flex flex-col items-center justify-center relative z-10 w-full h-full">
<!-- Subtle Glow Background -->
<div class="absolute inset-0 flex items-center justify-center -z-10 pointer-events-none">
<div class="w-[300px] h-[300px] splash-glow rounded-full"></div>
</div>
<!-- Logo Icon -->
<div class="relative flex items-center justify-center mb-md">
<!-- Simulating the bowl with lightning bolt using Material Symbols and sizing -->
<div class="relative w-[72px] h-[72px] flex items-center justify-center text-chopquick-orange">
<span class="material-symbols-outlined text-[72px]" style="font-variation-settings: 'FILL' 1;">
                    bolt
                </span>
<!-- Decorative element to suggest bowl shape behind the bolt if needed, but keeping it simple for the literal request -->
<div class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-10 h-3 border-b-4 border-l-4 border-r-4 border-chopquick-orange rounded-b-full opacity-50"></div>
</div>
</div>
<!-- Wordmark -->
<h1 class="font-display-mobile text-on-background mb-xs tracking-tight">
            ChopQuick
        </h1>
<!-- Tagline -->
<p class="font-body text-on-surface-variant">
            Eat smart. Save Lagos.
        </p>
</main>
<!-- Bottom Progress Bar -->
<div class="progress-bar-container">
<div class="progress-bar"></div>
</div>
</body></html>
