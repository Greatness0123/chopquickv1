<p class="font-body text-body text-on-surface-variant">Earn the Green Partner trust badge to assure customers of your quality and reliability.</p>
</div>
<!-- Options -->
<div class="flex flex-col gap-md">
<!-- Option 1: CAC Registration -->
<label class="flex items-start gap-md p-md rounded-lg bg-surface-container border border-outline-variant cursor-pointer hover:bg-surface-variant transition-colors group">
<div class="pt-1">
<input checked="" class="w-5 h-5 bg-transparent border-outline-variant text-primary focus:ring-primary focus:ring-offset-background" name="verification_method" type="radio"/>
</div>
<div class="flex flex-col gap-xs flex-1">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">description</span>
<span class="font-h2 text-h2 text-on-surface">CAC Registration</span>
</div>
<p class="font-caption text-caption text-on-surface-variant">Upload your Corporate Affairs Commission documents for full business verification.</p>
</div>
</label>
<!-- Option 2: BVN -->
<label class="flex items-start gap-md p-md rounded-lg bg-surface-container border border-outline-variant cursor-pointer hover:bg-surface-variant transition-colors group">
<div class="pt-1">
<input class="w-5 h-5 bg-transparent border-outline-variant text-primary focus:ring-primary focus:ring-offset-background" name="verification_method" type="radio"/>
</div>
<div class="flex flex-col gap-xs flex-1">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">badge</span>
<span class="font-h2 text-h2 text-on-surface">BVN Link</span>
</div>
<p class="font-caption text-caption text-on-surface-variant">Securely link your Bank Verification Number for identity confirmation.</p>
</div>
</label>
<!-- Option 3: Phone Verification -->
<label class="flex items-start gap-md p-md rounded-lg bg-surface-container border border-outline-variant cursor-pointer hover:bg-surface-variant transition-colors group">
<div class="pt-1">
<input class="w-5 h-5 bg-transparent border-outline-variant text-primary focus:ring-primary focus:ring-offset-background" name="verification_method" type="radio"/>
</div>
<div class="flex flex-col gap-xs flex-1">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">smartphone</span>
<span class="font-h2 text-h2 text-on-surface">Phone Verification</span>
</div>
<p class="font-caption text-caption text-on-surface-variant">Receive a quick SMS code to verify your registered phone number.</p>
</div>
</label>

<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">verified</span>
