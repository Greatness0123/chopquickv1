<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChopQuick - Partner Onboarding</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#2b292f",
                      "secondary": "#cdc0e9",
                      "on-primary": "#381e72",
                      "on-tertiary": "#3e2e00",
                      "on-primary-container": "#e0d2ff",
                      "primary-fixed": "#e9ddff",
                      "outline": "#948e9c",
                      "error": "#ffb4ab",
                      "surface": "#141218",
                      "on-secondary-fixed-variant": "#4b4263",
                      "surface-tint": "#cfbcff",
                      "surface-variant": "#36343a",
                      "surface-bright": "#3b383e",
                      "surface-container": "#211f24",
                      "tertiary-fixed-dim": "#e7c365",
                      "on-tertiary-fixed-variant": "#594400",
                      "on-secondary-container": "#bfb2da",
                      "primary-container": "#6750a4",
                      "secondary-container": "#4d4465",
                      "background": "#141218",
                      "surface-container-lowest": "#0f0d13",
                      "on-error": "#690005",
                      "tertiary-container": "#c9a74d",
                      "surface-dim": "#141218",
                      "inverse-primary": "#6750a4",
                      "secondary-fixed-dim": "#cdc0e9",
                      "surface-container-highest": "#36343a",
                      "on-tertiary-fixed": "#241a00",
                      "inverse-surface": "#e6e0e9",
                      "error-container": "#93000a",
                      "on-primary-fixed": "#22005d",
                      "inverse-on-surface": "#322f35",
                      "surface-container-low": "#1d1b20",
                      "on-error-container": "#ffdad6",
                      "on-tertiary-container": "#503d00",
                      "on-secondary-fixed": "#1f1635",
                      "on-background": "#e6e0e9",
                      "tertiary": "#e7c365",
                      "on-secondary": "#342b4b",
                      "on-surface-variant": "#cbc4d2",
                      "outline-variant": "#494551",
                      "tertiary-fixed": "#ffdf93",
                      "on-surface": "#e6e0e9",
                      "secondary-fixed": "#e9ddff",
                      "primary-fixed-dim": "#cfbcff",
                      "primary": "#cfbcff",
                      "on-primary-fixed-variant": "#4f378a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xxl": "3rem",
                      "margin_mobile": "1rem",
                      "xs": "0.25rem",
                      "sm": "0.5rem",
                      "lg": "1.5rem",
                      "xl": "2rem",
                      "gutter": "1rem",
                      "margin_desktop": "2.5rem",
                      "md": "1rem"
              },
              "fontFamily": {
                      "h1": ["Inter"],
                      "caption": ["Inter"],
                      "display-mobile": ["Inter"],
                      "body": ["Inter"],
                      "label-caps": ["Inter"],
                      "h2": ["Inter"],
                      "display": ["Inter"]
              },
              "fontSize": {
                      "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                      "caption": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],
                      "display-mobile": ["40px", { "lineHeight": "1.1", "fontWeight": "700" }],
                      "body": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                      "label-caps": ["11px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                      "h2": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                      "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
              }
            }
          }
        }
    </script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
</head>
<body class="bg-background text-on-background font-body text-body min-h-screen flex items-center justify-center p-md sm:p-lg md:p-xl relative antialiased">
<!-- Decorative Glow Element -->
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-primary/10 blur-[120px] rounded-full pointer-events-none opacity-50"></div>
<main class="w-full max-w-2xl bg-surface border border-outline-variant rounded-xl p-lg md:p-xxl flex flex-col gap-xl relative z-10 shadow-2xl">
<!-- Header & Branding -->
<header class="flex flex-col gap-sm">
<div class="flex items-center justify-between">
<h2 class="font-h2 text-h2 text-primary tracking-tight">ChopQuick Partner</h2>
<span class="font-label-caps text-label-caps text-on-surface-variant bg-surface-container px-sm py-xs rounded-full">STEP 1 OF 4</span>
</div>
<h1 class="font-display-mobile text-display-mobile text-on-surface mt-sm">Business Details</h1>
<p class="font-body text-body text-on-surface-variant">Tell us about your restaurant to get started on the platform.</p>
</header>
<!-- Progress Indicator -->
<div aria-label="Progress" class="flex gap-sm w-full">
<div class="h-1.5 flex-1 bg-primary rounded-full [box-shadow:0_0_10px_rgba(207,188,255,0.4)]"></div>
<div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
</div>
<!-- Form Canvas -->
<form class="flex flex-col gap-lg">
<!-- Restaurant Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="restaurantName">Restaurant Name</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-md py-sm font-body text-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="restaurantName" placeholder="e.g. Mama's Kitchen" type="text"/>
</div>
<!-- Full Address -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="address">Full Address</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container border border-outline-variant rounded-lg pl-md pr-xl py-sm font-body text-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="address" placeholder="Street address, neighborhood" type="text"/>
<button aria-label="Open maps" class="absolute right-md text-primary hover:text-primary-fixed transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">location_on</span>
</button>
</div>
</div>
<!-- Grid for shorter inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Restaurant Type -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="restaurantType">Restaurant Type</label>
<div class="relative">
<select class="w-full bg-surface-container border border-outline-variant rounded-lg px-md py-sm font-body text-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none" id="restaurantType">
<option class="text-outline" disabled="" selected="" value="">Select category...</option>
<option value="qsr">Quick Service (QSR)</option>
<option value="casual">Casual Dining</option>
<option value="bakery">Bakery &amp; Cafe</option>
<option value="foodtruck">Food Truck</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">arrow_drop_down</span>
</div>
</div>
<!-- Average Daily Covers -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="covers">Average Daily Covers</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-md py-sm font-body text-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="covers" placeholder="e.g. 150" type="number"/>
</div>
</div>
<!-- Instagram Handle -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="instagram">Instagram Handle (Optional)</label>
<div class="relative flex items-center">
<span class="absolute left-md font-body text-body text-outline select-none">@</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg pl-xl pr-md py-sm font-body text-body text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="instagram" placeholder="yourrestaurant" type="text"/>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-end pt-lg mt-md border-t border-surface-container-highest">
<button class="bg-primary text-on-primary font-h2 text-h2 py-sm px-xl rounded-full transition-all hover:bg-primary-fixed [box-shadow:0_0_20px_rgba(232,72,15,0.35)] flex items-center gap-sm" type="button">
                    Next
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
</main>
</body></html>
