<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChopQuick - Green Partner Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#2b292f",
                        "secondary": "#cdc0e9",
                        "on-primary": "#381e72",
                        "on-tertiary": "#3e2e00",
                        "on-primary-container": "#e0d2ff",
                        "primary-fixed": "#e9ddff",
                        "outline": "#948e9c",
                        "error": "#ffb4ab",
                        "surface": "#141218",
                        "on-secondary-fixed-variant": "#4b4263",
                        "surface-tint": "#cfbcff",
                        "surface-variant": "#36343a",
                        "surface-bright": "#3b383e",
                        "surface-container": "#211f24",
                        "tertiary-fixed-dim": "#e7c365",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-secondary-container": "#bfb2da",
                        "primary-container": "#6750a4",
                        "secondary-container": "#4d4465",
                        "background": "#141218",
                        "surface-container-lowest": "#0f0d13",
                        "on-error": "#690005",
                        "tertiary-container": "#c9a74d",
                        "surface-dim": "#141218",
                        "inverse-primary": "#6750a4",
                        "secondary-fixed-dim": "#cdc0e9",
                        "surface-container-highest": "#36343a",
                        "on-tertiary-fixed": "#241a00",
                        "inverse-surface": "#e6e0e9",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#22005d",
                        "inverse-on-surface": "#322f35",
                        "surface-container-low": "#1d1b20",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#503d00",
                        "on-secondary-fixed": "#1f1635",
                        "on-background": "#e6e0e9",
                        "tertiary": "#e7c365",
                        "on-secondary": "#342b4b",
                        "on-surface-variant": "#cbc4d2",
                        "outline-variant": "#494551",
                        "tertiary-fixed": "#ffdf93",
                        "on-surface": "#e6e0e9",
                        "secondary-fixed": "#e9ddff",
                        "primary-fixed-dim": "#cfbcff",
                        "primary": "#cfbcff",
                        "on-primary-fixed-variant": "#4f378a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xxl": "3rem",
                        "margin_mobile": "1rem",
                        "xs": "0.25rem",
                        "sm": "0.5rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "gutter": "1rem",
                        "margin_desktop": "2.5rem",
                        "md": "1rem"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "caption": ["Inter"],
                        "display-mobile": ["Inter"],
                        "body": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2": ["Inter"],
                        "display": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "caption": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "display-mobile": ["40px", { "lineHeight": "1.1", "fontWeight": "700" }],
                        "body": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "h2": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .orange-glow {
            box-shadow: 0 0 20px rgba(232, 72, 15, 0.35);
        }
        .particle {
            position: absolute;
            background-color: #E8480F;
            border-radius: 50%;
            opacity: 0.6;
        }
        /* Simulating some particles statically for the UI design */
        .p1 { top: 20%; left: 15%; width: 6px; height: 6px; }
        .p2 { top: 30%; left: 80%; width: 10px; height: 10px; opacity: 0.3; }
        .p3 { top: 70%; left: 20%; width: 8px; height: 8px; }
        .p4 { top: 60%; left: 85%; width: 5px; height: 5px; opacity: 0.8; }
        .p5 { top: 10%; left: 50%; width: 7px; height: 7px; }
        .p6 { top: 85%; left: 45%; width: 9px; height: 9px; opacity: 0.4; }
        .p7 { top: 45%; left: 10%; width: 4px; height: 4px; }
        .p8 { top: 50%; left: 90%; width: 12px; height: 12px; opacity: 0.2; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Particle Confetti Background -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>
<div class="particle p6"></div>
<div class="particle p7"></div>
<div class="particle p8"></div>
</div>
<!-- Main Content Container -->
<main class="z-10 flex flex-col items-center justify-center text-center p-margin_mobile md:p-margin_desktop max-w-2xl w-full">
<!-- Green Partner Badge -->
<div class="mb-xl relative">
<div class="w-32 h-32 md:w-40 md:h-40 bg-surface-container-high rounded-full border-4 border-primary flex items-center justify-center orange-glow">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
</div>
<!-- Typography -->
<h1 class="font-display-mobile text-display-mobile md:font-display md:text-display text-primary mb-sm">
            Welcome to ChopQuick, <br/><span class="text-on-surface">Mama's Kitchen</span>!
        </h1>
<p class="font-h2 text-h2 text-on-surface-variant mb-xxl">
            You are now a Green Partner.
        </p>
<!-- Actions -->
<div class="flex flex-col md:flex-row gap-md w-full justify-center">
<button class="bg-[#E8480F] text-white font-body text-body py-3 px-8 rounded-full orange-glow hover:bg-opacity-90 transition-all flex items-center justify-center gap-sm w-full md:w-auto">
                Go to my Dashboard
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<button class="bg-transparent border border-outline text-on-surface font-body text-body py-3 px-8 rounded-full hover:bg-surface-variant transition-colors flex items-center justify-center gap-sm w-full md:w-auto">
<span class="material-symbols-outlined text-sm">download</span>
                Download my Badge
            </button>
</div>
</main>
</body></html>
